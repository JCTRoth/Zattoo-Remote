    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zattoo Remote</title>

  <body>
    <!-- The webview loads Zattoo directly (url: "https://zattoo.com" in tauri.conf.json).

         style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
                background:#0a0a0a;color:#fff;font-family:-apple-system,sans-serif;font-size:24px;
                flex-direction:column;gap:16px;">
      <div>Zattoo Remote</div>
      <div style="font-size:14px;color:#888;">Loading Zattoo...</div>
    </div>
  </body>
</html>
