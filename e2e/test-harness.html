<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zattoo Remote — E2E Test Page</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background: #0a0a0a;
      color: #fff;
    }
    #status { margin-top: 16px; white-space: pre-wrap; font-size: 12px; color: #888; }
    #test-result { margin-top: 8px; padding: 8px; background: #1a1a1a; border-radius: 4px; }
    .pass { color: #00e676; }
    .fail { color: #ff1744; }
  </style>
</head>
<body>
  <h2>Zattoo Remote — E2E Test Harness</h2>
  <p>This page loads the injected script and lets Playwright simulate remote key events.</p>

  <div id="test-result">Waiting for tests...</div>
  <pre id="status"></pre>

  <script>
    // Capture all console output for the test
    const logs = [];
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;

    console.log = function(...args) {
      logs.push({ level: 'log', text: args.join(' '), timestamp: Date.now() });
      originalLog.apply(console, args);
    };
    console.error = function(...args) {
      logs.push({ level: 'error', text: args.join(' '), timestamp: Date.now() });
      originalError.apply(console, args);
    };
    console.warn = function(...args) {
      logs.push({ level: 'warn', text: args.join(' '), timestamp: Date.now() });
      originalWarn.apply(console, args);
    };

    // Expose logs to Playwright
    window.__testLogs = logs;
  </script>
</body>
</html>
